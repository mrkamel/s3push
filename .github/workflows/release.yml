name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o s3push-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -o s3push-linux-arm64 .
          GOOS=darwin GOARCH=amd64 go build -o s3push-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o s3push-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -o s3push-windows-amd64.exe .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            s3push-linux-amd64
            s3push-linux-arm64
            s3push-darwin-amd64
            s3push-darwin-arm64
            s3push-windows-amd64.exe
